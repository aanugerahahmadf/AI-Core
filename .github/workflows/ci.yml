name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pylint

      - name: Prepare data directories
        run: python -c "import os; [os.makedirs(d, exist_ok=True) for d in ['data/inputs', 'data/features', 'data/uploads', 'data/evaluation', 'reports/images']]"

      - name: Rebuild feature index
        run: python -m src.features.build_features --method combined

      - name: Lint
        run: pylint src/ app.py rebuild_index.py --rcfile=pylintrc --score=yes || true

      - name: Test
        run: python -m pytest tests/ -v --tb=short

  notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert

      - name: Prepare data
        run: |
          python -c "import os; [os.makedirs(d, exist_ok=True) for d in ['data/inputs', 'data/features', 'data/uploads', 'data/evaluation']]"
          python -m src.features.build_features --method combined

      - name: Check notebook executes
        run: jupyter nbconvert --to notebook --execute wedding_cbir_playground.ipynb --output wedding_cbir_playground_executed.ipynb --ExecutePreprocessor.timeout=600
